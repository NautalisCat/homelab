apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: n8n
          image: ghcr.io/n8n-io/n8n:2.21.1
          ports:
            - containerPort: 5678
          envFrom:
             - configMapRef:
                 name: n8n-env
            #- secretRef:
                #name: linkding-container-env
          securityContext:
            allowPrivilegeEscalation: False

          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-storage
      volumes:
        - name: n8n-storage
          persistentVolumeClaim:
            claimName: n8n-pvc
