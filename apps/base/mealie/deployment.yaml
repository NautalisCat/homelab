apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:v3.16.0
          ports:
            - containerPort: 9000
          #envFrom:
          # - configMapRef:
          #     name:
          # - secretRef:
          #     name:

          securityContext:
            allowPrivilegeEscalation: False

          volumeMounts:
            - mountPath: /app/data/
              name: mealie-data
      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data
